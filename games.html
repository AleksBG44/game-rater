<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Игры</title>
  <link rel="stylesheet" href="style.css">
  <script src="site.js" defer></script>
</head>
<body>
  <div class="app-layout">

    <aside class="sidebar">
      <div class="sidebar-logo">Рейтинатор 1.0 🎮</div>

      <button class="sidebar-btn" onclick="window.location.href='index.html'">
        Оценка
      </button>

      <button class="sidebar-btn active" onclick="window.location.href='games.html'">
        Игры
      </button>

      
      <div class="rawg-credit">
        Данные об играх предоставлены 
        <a href="https://rawg.io/" target="_blank">RAWG.io</a>
      </div>
    </aside>

    <main class="main-content">
      <section id="gamesSection" class="content-section">
        <div class="app-shell">
          <div class="panel">
            <h2 class="games-title">Сохранённые игры</h2>

           <div class="games-toolbar">
              <div class="search-box">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M21 21L16.65 16.65M10 18C5.58 18 2 14.42 2 10C2 5.58 5.58 2 10 2C14.42 2 18 5.58 18 10C18 14.42 14.42 18 10 18Z"></path>
                </svg>

                <input
                  type="text"
                  id="gamesSearch"
                  class="games-search"
                  placeholder="Поиск по играм..."
                >
              </div>

              <div class="sort-box">
                <button id="sortToggle" class="sort-btn" type="button">Рейтинг ↓</button>

                <div id="sortMenu" class="sort-menu">
                  <button class="sort-option active" type="button" data-sort="rating-desc">Рейтинг ↓</button>
                  <button class="sort-option" type="button" data-sort="rating-asc">Рейтинг ↑</button>
                  <button class="sort-option" type="button" data-sort="name-asc">Имя A-Z</button>
                  <button class="sort-option" type="button" data-sort="name-desc">Имя Z-A</button>
                </div>
              </div>
            </div>


            
            <div class="list" id="gameList"></div>

            <div class="actions-games">
              <button class="danger-btn" onclick="clearAllGames()">Очистить всё</button>
            </div>
          </div>
        </div>
      </section>
    </main>

  </div>
</body>
</html>
